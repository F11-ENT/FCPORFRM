<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porsela Web — Pencarian ID Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #17182B;
    --navy:       #262A4F;
    --indigo:     #4B4FE0;
    --indigo-dk:  #373AB0;
    --cream:      #F6F4EF;
    --card-bg:    #FFFFFF;
    --gold:       #D9A441;
    --line:       #E4E1D8;
    --muted:      #8A8A99;
    --danger:     #C5493A;
    --radius-lg:  24px;
    --radius-md:  16px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'IBM Plex Sans', sans-serif;
    background:
      radial-gradient(circle at 12% -10%, rgba(75,79,224,0.10), transparent 45%),
      radial-gradient(circle at 90% 0%, rgba(217,164,65,0.12), transparent 40%),
      var(--cream);
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 56px 20px;
  }

  .page {
    width: 100%;
    max-width: 440px;
  }

  /* ---------- Header ---------- */
  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 34px;
  }
  .brand .mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    border: 1px solid var(--line);
  }
  .brand .mark img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .brand span {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  h1.title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 40px;
    line-height: 1.02;
    text-align: center;
    margin: 0 0 6px 0;
    letter-spacing: -0.5px;
  }
  h1.title .accent { color: var(--indigo); }

  p.tagline {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 32px 0;
  }

  /* ---------- Search panel ---------- */
  .panel {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 26px;
    box-shadow: 0 18px 40px -22px rgba(23,24,43,0.25);
    margin-bottom: 22px;
  }

  label.field-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .search-row {
    display: flex;
    gap: 10px;
  }

  input#nameInput {
    flex: 1;
    min-width: 0;
    padding: 14px 16px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: var(--radius-md);
    outline: none;
    background: var(--cream);
    transition: border-color .15s ease, background .15s ease;
  }
  input#nameInput::placeholder { color: #B4B3C3; }
  input#nameInput:focus {
    border-color: var(--indigo);
    background: #fff;
  }

  button#cariBtn {
    flex-shrink: 0;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    padding: 0 22px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
  }
  button#cariBtn:hover { background: var(--indigo-dk); }
  button#cariBtn:active { transform: scale(0.97); }

  /* ---------- Result zone ---------- */
  .result-zone {
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* Empty state */
  .empty-state {
    color: var(--muted);
    padding: 10px 8px;
  }
  .empty-state svg { margin-bottom: 14px; opacity: 0.55; }
  .empty-state p { margin: 0; font-size: 14px; line-height: 1.6; max-width: 260px; }

  /* Not found state */
  .not-found-state { color: var(--danger); }
  .not-found-state svg { margin-bottom: 14px; }
  .not-found-state p { margin: 0 0 18px 0; font-size: 14px; line-height: 1.6; }
  .not-found-state strong { color: var(--ink); }

  .register-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--gold);
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 12px 22px;
    border-radius: var(--radius-md);
    transition: background .15s ease, transform .1s ease;
  }
  .register-btn:hover { background: #c8933a; }
  .register-btn:active { transform: scale(0.97); }

  /* Found: ID card */
  .id-card {
    width: 100%;
    background: linear-gradient(160deg, #1B1E3D 0%, #2B2F63 55%, #383C82 100%);
    border-radius: var(--radius-md);
    padding: 18px;
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 30px -18px rgba(23,24,43,0.55);
  }
  .id-card::after {
    content: "";
    position: absolute;
    top: -60%;
    right: -30%;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(217,164,65,0.35), transparent 70%);
  }
  .id-card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }
  .id-card-top .label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .chip {
    width: 30px;
    height: 22px;
    border-radius: 4px;
    background: linear-gradient(135deg, var(--gold), #f2d896);
  }
  .id-photo-wrap {
    position: relative;
    z-index: 1;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(255,255,255,0.06);
    aspect-ratio: 16 / 9;
  }
  .id-photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .id-card-name {
    position: relative;
    z-index: 1;
    margin-top: 14px;
    text-align: left;
  }
  .id-card-name .n {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .id-card-name .id-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    margin-top: 2px;
  }

  /* ---------- Download button ---------- */
  button#downloadBtn {
    width: 100%;
    margin-top: 18px;
    padding: 15px 20px;
    background: var(--indigo);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    opacity: 0.35;
    pointer-events: none;
    transition: background .15s ease, opacity .15s ease, transform .1s ease;
  }
  button#downloadBtn.active {
    opacity: 1;
    pointer-events: auto;
  }
  button#downloadBtn.active:hover { background: var(--indigo-dk); }
  button#downloadBtn.active:active { transform: scale(0.98); }

  footer.note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 24px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="page">

  <div class="brand">
    <div class="mark"><img src="/images/123.png" alt="Logo Porsela"></div>
    <span>Porsela</span>
  </div>

  <h1 class="title">Cari ID<br><span class="accent">Card Anda</span></h1>
  <p class="tagline">Masukkan nama lengkap untuk menemukan kartu identitas digital Anda</p>

  <div class="panel">
    <label class="field-label" for="nameInput">Nama</label>
    <div class="search-row">
      <input type="text" id="nameInput" placeholder="cth. Auliya" autocomplete="off">
      <button id="cariBtn">CARI</button>
    </div>
  </div>

  <div class="panel result-zone" id="resultZone">
    <div class="empty-state" id="emptyState">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="3" y="5" width="18" height="14" rx="3"/>
        <circle cx="9" cy="10.5" r="2"/>
        <path d="M6 16c.6-1.8 2-2.7 3-2.7s2.4.9 3 2.7"/>
        <path d="M14 9.5h4M14 12.5h4"/>
      </svg>
      <p>Hasil pencarian akan tampil di sini sebagai kartu identitas yang bisa diunduh</p>
    </div>
  </div>

  <button id="downloadBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 3v13m0 0l-4-4m4 4l4-4"/>
      <path d="M4 19h16"/>
    </svg>
    Download ID Card
  </button>

  <footer class="note">Pencarian tidak membedakan huruf besar/kecil.</footer>
</div>

<script>
  // =========================================================================
  // "DATABASE" NAMA -> GAMBAR
  // Tambahkan / ganti entri di sini. Key HARUS huruf kecil semua (lowercase),
  // karena input pengguna otomatis di-lowercase sebelum dicocokkan.
  //
  // value bisa berupa:
  //  - path/URL gambar, contoh: "images/auliya.jpg"
  //  - atau base64 data-URI kalau mau ditanam langsung di file ini
  // =========================================================================
  const database = {
    "auliya": "images/auliya.jpg",
    "budi":   "images/budi.jpg",
    "citra":  "images/citra.jpg",
    "zaskya maulana": "images/Zaskya maulana.jpg"
  };

  // =========================================================================
  // LINK FORM PENDAFTARAN
  // Ganti URL di bawah ini dengan link form pendaftaran kamu
  // (misalnya Google Form, link WhatsApp, atau halaman pendaftaran lain).
  // =========================================================================
  const REGISTER_FORM_LINK = "https://forms.gle/TXk72Fd1CrVbd2P3A";

  const nameInput   = document.getElementById('nameInput');
  const cariBtn     = document.getElementById('cariBtn');
  const resultZone  = document.getElementById('resultZone');
  const downloadBtn = document.getElementById('downloadBtn');

  let currentImageUrl = null;
  let currentFileName = null;

  function emptyStateHTML(message) {
    return `
      <div class="empty-state">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <rect x="3" y="5" width="18" height="14" rx="3"/>
          <circle cx="9" cy="10.5" r="2"/>
          <path d="M6 16c.6-1.8 2-2.7 3-2.7s2.4.9 3 2.7"/>
          <path d="M14 9.5h4M14 12.5h4"/>
        </svg>
        <p>${message}</p>
      </div>`;
  }

  function notFoundHTML(name) {
    return `
      <div class="not-found-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="9"/>
          <path d="M9 9l6 6M15 9l-6 6"/>
        </svg>
        <p>Nama <strong>"${name}"</strong> tidak terdaftar</p>
        <a class="register-btn" href="${REGISTER_FORM_LINK}" target="_blank" rel="noopener">
          <svg width="10" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          </svg>
          Silahkan Daftar
        </a>
      </div>`;
  }

  function idCardHTML(name, imgSrc) {
    const idTag = 'ID-' + name.toUpperCase().replace(/\s+/g, '').slice(0, 8);
    return `
      <div class="id-card">
        <div class="id-card-top">
          <span class="label">Porsela ID Card</span>
          <div class="chip"></div>
        </div>
        <div class="id-photo-wrap">
          <img src="${imgSrc}" alt="${name}">
        </div>
        <div class="id-card-name">
          <div class="n">${name}</div>
          <div class="id-tag">${idTag}</div>
        </div>
      </div>`;
  }

  function cari() {
    const rawName = nameInput.value.trim();

    if (!rawName) {
      resultZone.innerHTML = emptyStateHTML('Silakan masukkan nama terlebih dahulu');
      resetDownload();
      return;
    }

    const key = rawName.toLowerCase();

    if (database.hasOwnProperty(key)) {
      const imgSrc = database[key];
      resultZone.innerHTML = idCardHTML(rawName, imgSrc);
      currentImageUrl = imgSrc;
      currentFileName = imgSrc.split('/').pop();
      downloadBtn.classList.add('active');
    } else {
      resultZone.innerHTML = notFoundHTML(rawName);
      resetDownload();
    }
  }

  function resetDownload() {
    currentImageUrl = null;
    currentFileName = null;
    downloadBtn.classList.remove('active');
  }

  function downloadImage() {
    if (!currentImageUrl) return;
    const a = document.createElement('a');
    a.href = currentImageUrl;
    a.download = currentFileName || 'id-card.jpg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  cariBtn.addEventListener('click', cari);
  downloadBtn.addEventListener('click', downloadImage);
  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') cari();
  });
</script>

</body>
</html>
